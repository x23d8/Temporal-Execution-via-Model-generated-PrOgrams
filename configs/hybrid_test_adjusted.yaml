experiment_name: hybrid_test_adjusted
method: hybrid
dataset: test_adjusted
dataset_path: F:/arithmetic/test_adjusted_prepared.jsonl
seed: 42
model_name: Qwen/Qwen3-4B
dtype: bfloat16
enable_thinking: false
k_shot: 0
max_samples: 50
output_dir: outputs
progress_every: 50
verbose: true
verbose_first_n: 5
verbose_every: 10
running_score_every: 25
# hybrid routing: pot = closed-form arithmetic, not = multi-entity relational
routing:
  add_subtract: pot
  trick:        pot
  timezone:     pot
  compare:      not
  schedule:     not
  duration:     not
  multi_op:     not
default_route: not
