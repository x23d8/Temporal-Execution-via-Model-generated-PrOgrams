# SFT (LoRA) for Gemma-4-E4B on VLSP DateArith VI — Phase 2.
# Maps 1-to-1 with src.training.sft.SFTRunConfig.
#
# Train pool = rows 1500..2999 of date_training_dataset.txt
#   rows 0..1499 are the Phase-1 eval set — never used for training.
# Split 90/10 (~1350 train + ~150 val), deterministic seed=42.
#
# Hardware recommendations:
#   A100 40 GB : bf16=true  fp16=false  load_in_4bit=false  (this config)
#   A100 20 GB : bf16=true  fp16=false  load_in_4bit=false  batch=1 grad_acc=8
#   T4   16 GB : bf16=false fp16=true   load_in_4bit=true   batch=1 grad_acc=8
#
# Notebook usage:
#   import yaml
#   from src.training.sft import SFTRunConfig, train_sft
#   cfg = SFTRunConfig(**yaml.safe_load(open("configs/sft_gemma4_e4b_lora.yaml")))
#   adapter_path = train_sft(cfg)

model_name: google/gemma-4-E4B
dtype: bfloat16
load_in_4bit: false          # set true for T4 QLoRA

dataset: vlsp_date
dataset_path: null
train_pool_start: 1500
train_pool_size: 1500
val_ratio: 0.1
shuffle_seed: 42

output_dir: checkpoints/gemma4_e4b_lora_vlsp_date

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj.linear
  - k_proj.linear
  - v_proj.linear
  - post.linear
  - ffw_layer_1.linear
  - ffw_layer_2.linear
num_epochs: 3
per_device_batch_size: 1
gradient_accumulation_steps: 8    # effective batch size = 8
learning_rate: 2.0e-4
warmup_ratio: 0.03
lr_scheduler: cosine
weight_decay: 0.0
max_seq_length: 256
bf16: true
fp16: false

logging_steps: 10
save_strategy: epoch
eval_strategy: epoch
save_total_limit: 2
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
report_to: none

seed: 42
