# ── Gemma-4-E4B-it  ·  LoRA  ·  fp16  ·  Kaggle T4/P100 ────────────────────
# Requires ~14-15 GB VRAM (4B params in fp16 + LoRA adapters).
# No quantization → faster training, but needs most of the T4's 16 GB.
# Reduce batch_size to 2 if you hit OOM.

model:
  name: "google/gemma-4-E4B-it"
  max_length: 512
  trust_remote_code: false

peft:
  method: "lora"          # standard LoRA — no quantization
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
    bias: "none"

training:
  epochs: 5
  learning_rate: 2.0e-4
  batch_size: 2
  eval_batch_size: 2
  gradient_accumulation_steps: 8   # effective batch = 16
  warmup_steps: 50
  weight_decay: 0.01
  max_grad_norm: 1.0
  fp16: true
  bf16: false
  optim: "paged_adamw_32bit"
  lr_scheduler_type: "cosine"
  dataloader_num_workers: 2
  seed: 42

early_stopping:
  enabled: true
  patience: 3
  min_delta: 0.001
  monitor: "eval_loss"

data:
  train_path: "data/train.jsonl"
  eval_path: null                 # null → auto-split from train
  format: "instruction"           # "text" | "instruction" | "chat"
  instruction_column: "instruction"
  input_column: "input"
  output_column: "output"
  prompt_template: |
    <start_of_turn>user
    {instruction}<end_of_turn>
    <start_of_turn>model
    {output}<end_of_turn>
  validation_split: 0.1
  max_samples: null

logging:
  output_dir: "finetune/outputs/gemma4_lora"

checkpoint:
  enabled: true
  save_total_limit: 3
  resume_from: null             # "auto" | null | "/path/to/ckpt"
